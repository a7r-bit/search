services:

  app:
    env_file:
      - .env
    # build:
    #   context: .
    #   dockerfile: Dockerfile.dev

    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
      - ./uploads:/app/uploads

    
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
        - action: sync
          path: ./prisma
          target: /app/prisma
          ignore:
            - node_modules/
        - action: restart
          path: package.json

    container_name: nest_app
    ports:
      - "3000:3000"
      - "5555:5555"

    # command: npm run start:dev
    command: sh -c "npm ci && npx prisma generate && npm run start:dev"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gotenberg:
        condition: service_started
      openldap:
        condition: service_started

    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/Search?schema=public
      REDIS_PORT: 6379
      REDIS_HOST: redis
      GOTENBERG_PORT: 3001
      GOTENBERG_URL: http://gotenberg:3000
      LDAP_HOST: openldap
      LDAP_PORT: 389
      LDAP_BASEDN: dc=mycompany,dc=local
      LDAP_ADMIN_DN: cn=admin,dc=mycompany,dc=local
      LDAP_ADMIN_PASSWORD: admin
      HOST: 0.0.0.0
      PORT: 3000
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY}
      JWT_EXPIRES_IN_ACCESS: ${JWT_EXPIRES_IN_ACCESS}
      JWT_EXPIRES_IN_REFRESH: ${JWT_EXPIRES_IN_REFRESH}
        
    networks:
      - appnet
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Search
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d Search || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

    networks:
      - appnet

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 2s

    networks:
      - appnet

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: gotenberg
    ports:
      - "3001:3000"
    networks:
      - appnet

  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    environment:
      LDAP_ORGANISATION: "MyCompany"
      LDAP_DOMAIN: "mycompany.local"
      LDAP_ADMIN_PASSWORD: admin
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    ports:
      - "389:389"
    networks:
      - appnet

  phpldapadmin:
    image: osixia/phpldapadmin:0.8.0
    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8080:80"
    depends_on:
      - openldap
    networks:
      - appnet

  elasticsearch:
    env_file:
      - .env
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: elasticsearch

    volumes:
      - esdata:/usr/share/elasticsearch/data

    ports:
      - "${ELASTICSEARCH_PORT}:9200"

    environment:
      - node.name=elasticsearch
      - cluster.name=${CLUSTER_NAME}
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - appnet

volumes:
  pgdata:
  ldap_data:
  ldap_config:
  file_storage:
  esdata:
    driver: local

networks:
  appnet:
    driver: bridge
